<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Person Recognition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            padding: 40px 20px 10px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        input[type="file"] {
            padding: 10px;
            background-color: #ffffff;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 18px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }

        .image-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .image-container img {
            max-width: 90%;
            height: auto;
            border: 4px solid #007BFF;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h2>Person Recognition Web App</h2>
        <form method="post" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <button type="submit">Detect</button>
        </form>
    </header>

    {% if result_image %}
        <div class="image-container">
            <img src="{{ url_for('static', filename='uploads/' + result_image.split('/')[-1]) }}" alt="Detected Image">
        </div>
    {% endif %}
</body>
</html>
